# 3proxy configuration
daemon
log /dev/stdout
rotate 0

service
    proxy
    socks

internal 0.0.0.0
external 0.0.0.0

# Прокси-порты
proxy -p3128
socks -p1080

# ---- Включаем аутентификацию ----
auth strong

# Создаём пользователей (логин:пароль)
# Формат: users логин:CL:пароль
users myuser:CL:mypassword
# Можно добавить несколько:
# users user1:CL:pass1 user2:CL:pass2

# Разрешаем доступ только для аутентифицированных пользователей
allow * * * * *
